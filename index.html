        <style>
          .cssload-main {
            position: relative;
            margin: 2rem auto 0;
            width: max-content;
            padding: 0.9rem 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255,166,201,0.12);
            border-radius: 1rem;
          }

          .cssload-heart {
            animation: cssload-heart 2.88s cubic-bezier(0.75, 0, 0.5, 1) infinite;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            background: rgba(255,255,255,0.9);
            border-radius: 999px;
            position: relative;
          }

          .cssload-heartL,
          .cssload-heartR,
          .cssload-square {
            position: absolute;
            display: block;
            background-color: rgb(252, 0, 101);
          }

          .cssload-heartL {
            width: 12px;
            height: 24px;
            border-radius: 12px 12px 0 0;
            transform: translate(-28px, -27px);
            animation: cssload-heartL 2.88s cubic-bezier(0.75, 0, 0.5, 1) infinite;
          }

          .cssload-heartR {
            width: 12px;
            height: 24px;
            border-radius: 12px 12px 0 0;
            transform: translate(28px, -27px);
            animation: cssload-heartR 2.88s cubic-bezier(0.75, 0, 0.5, 1) infinite;
          }

          .cssload-square {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            transform: scale(1) rotate(-45deg);
            animation: cssload-square 2.88s cubic-bezier(0.75, 0, 0.5, 1) infinite;
          }

          .cssload-shadow {
            width: 84px;
            height: 8px;
            background-color: rgba(215, 215, 215, 0.8);
            border-radius: 999px;
            margin-top: 1rem;
            animation: cssload-shadow 2.88s cubic-bezier(0.75, 0, 0.5, 1) infinite;
          }

          @keyframes cssload-square {
            50% { border-radius: 100%; transform: scale(0.5) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
          }

          @keyframes cssload-heart {
            50% { transform: rotate(360deg); }
            100% { transform: rotate(720deg); }
          }

          @keyframes cssload-heartL {
            60% { transform: translate(-28px, -27px) scale(0.4); }
          }

          @keyframes cssload-heartR {
            40% { transform: translate(28px, -27px) scale(0.4); }
          }

          @keyframes cssload-shadow {
            50% { transform: scale(0.5); border-color: rgb(228, 228, 228); }
          }
        </style>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>

            <span class="cssload-heartR"></span>
            <span class="cssload-square"></span>
          </div>
          <div class="cssload-shadow"></div>
